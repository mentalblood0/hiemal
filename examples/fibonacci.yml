WITH:
  DEFINITIONS:
    FIBONACCI_1:
      IF:
        IS_SORTED: [_, 1]
      THEN: _
      ELSE:
        WITH:
          CONSTANTS:
            x: _
        COMPUTE:
          SUM:
            - FIBONACCI_2:
                SUM: [x, -1]
            - FIBONACCI_2:
                SUM: [x, -2]
    FIBONACCI_2:
      IF:
        IS_SORTED: [_, 1]
      THEN: _
      ELSE:
        WITH:
          CONSTANTS:
            x: _
        COMPUTE:
          SUM:
            - FIBONACCI_1:
                SUM: [x, -1]
            - FIBONACCI_1:
                SUM: [x, -2]
