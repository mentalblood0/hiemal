WITH:
  DEFINITIONS:
    FIBONACCI:
      IF:
        IS_SORTED: [_, 1]
      THEN: _
      ELSE:
        WITH:
          CONSTANTS:
            x: _
        COMPUTE:
          SUM:
            - FIBONACCI:
                SUM: [x, -1]
            - FIBONACCI:
                SUM: [x, -2]
COMPUTE:
  FIBONACCI: 10
